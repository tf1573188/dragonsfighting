<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRAGONS — Pan-Asian Fighting Circuit</title>
<meta name="description" content="DRAGONS is a fictional pan-Asian female fighting circuit. 59 original fighters across 18 nations — AI-generated fight videos sold on Gumroad.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://dragonsfighting.com/">
<meta property="og:title" content="DRAGONS — Pan-Asian Fighting Circuit">
<meta property="og:description" content="59 original fighters. 18 nations. One ring. AI-generated fight videos — watch the circuit unfold.">
<meta property="og:image" content="https://dragonsfighting.com/images/pei-yee-lim.png">
<meta property="og:image:width" content="630">
<meta property="og:image:height" content="840">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="DRAGONS — Pan-Asian Fighting Circuit">
<meta name="twitter:description" content="59 original fighters. 18 nations. One ring. AI-generated fight videos — watch the circuit unfold.">
<meta name="twitter:image" content="https://dragonsfighting.com/images/pei-yee-lim.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Barlow:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif+SC:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icons/7.2.3/css/flag-icons.min.css">
<style>
  :root{
    --bg:#0a0c0b;--bg-2:#11150f;--panel:#15140f;--ink:#ece7d8;--muted:#a8a79a;
    --gold:#d4a528;--gold-bright:#f0c44a;--emerald:#1f9e6b;--emerald-deep:#0e6b46;
    --line:rgba(212,165,40,.18);--maxw:1200px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--ink);font-family:'Barlow','Inter',system-ui,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  a{color:inherit;text-decoration:none}
  img{display:block;max-width:100%}
  ::selection{background:var(--gold);color:#0a0c0b}

  /* NAV */
  header.nav{position:sticky;top:0;z-index:50;background:rgba(10,12,11,.82);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .nav-inner{max-width:var(--maxw);margin:0 auto;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:20px}
  .brand{display:flex;align-items:center;gap:11px;cursor:pointer}
  .brand .glyph{font-family:'Noto Serif SC',serif;font-weight:900;font-size:30px;color:var(--gold);line-height:1}
  .brand .word{font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:.30em;font-size:20px;color:var(--ink)}
  nav.links{display:flex;gap:28px;align-items:center}
  nav.links a{font-family:'Oswald',sans-serif;font-weight:500;letter-spacing:.12em;text-transform:uppercase;font-size:13px;color:var(--muted);padding:6px 0;border-bottom:2px solid transparent;transition:.2s}
  nav.links a:hover,nav.links a.active{color:var(--ink);border-color:var(--gold)}
  .nav-shop{font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:.1em;text-transform:uppercase;font-size:13px;background:var(--gold);color:#0a0c0b;padding:9px 18px;border-radius:2px;transition:.2s}
  .nav-shop:hover{background:var(--gold-bright)}
  .burger{display:none;background:none;border:0;color:var(--ink);font-size:26px;cursor:pointer}

  main{min-height:70vh}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}
  .eyebrow{font-family:'Oswald',sans-serif;letter-spacing:.34em;text-transform:uppercase;font-size:12px;color:var(--gold);font-weight:600}
  section{padding:72px 0}
  h1,h2,h3{font-family:'Oswald',sans-serif;font-weight:700;letter-spacing:.02em;line-height:1.05}

  /* HERO + LOGO BANNER */
  .hero{position:relative;min-height:92vh;display:flex;align-items:center;justify-content:center;text-align:center;border-bottom:1px solid var(--line);overflow:hidden}
  .hero-bg{position:absolute;inset:0;background:radial-gradient(circle at 50% 38%, rgba(31,158,107,.18), transparent 52%),radial-gradient(circle at 50% 80%, rgba(212,165,40,.12), transparent 55%),linear-gradient(180deg,#0a0c0b 0%, #0d100c 55%, #0a0c0b 100%)}
  .hero .wrap{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center}
  /* The logo lockup */
  .logo{display:flex;flex-direction:column;align-items:center;gap:6px;margin-bottom:8px}
  .logo .ring{position:relative;width:128px;height:128px;display:flex;align-items:center;justify-content:center;margin-bottom:18px}
  .logo .ring svg{position:absolute;inset:0;width:100%;height:100%}
  .logo .ring .char{font-family:'Noto Serif SC',serif;font-weight:900;font-size:64px;color:var(--gold);position:relative;z-index:2;text-shadow:0 0 30px rgba(212,165,40,.35)}
  .logo .wordmark{font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(54px,13vw,128px);letter-spacing:.16em;color:var(--ink);text-indent:.16em;line-height:.9}
  .logo .underbar{display:flex;align-items:center;gap:14px;margin-top:14px}
  .logo .underbar .ln{height:1px;width:clamp(40px,12vw,120px);background:linear-gradient(90deg,transparent,var(--gold))}
  .logo .underbar .ln.r{background:linear-gradient(90deg,var(--gold),transparent)}
  .logo .underbar .tag{font-family:'Oswald',sans-serif;font-weight:500;letter-spacing:.36em;text-transform:uppercase;font-size:clamp(10px,1.6vw,14px);color:var(--gold)}
  .hero .sub{font-size:clamp(16px,2vw,20px);color:var(--muted);max-width:600px;margin-top:30px}
  .hero .sub b{color:var(--ink);font-weight:600}
  .hero-cta{display:flex;gap:16px;margin-top:34px;flex-wrap:wrap;justify-content:center}
  .btn{font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:.1em;text-transform:uppercase;font-size:14px;padding:14px 28px;border-radius:2px;cursor:pointer;border:1px solid transparent;transition:.2s;display:inline-block;text-align:center}
  .btn-gold{background:var(--gold);color:#0a0c0b}
  .btn-gold:hover{background:var(--gold-bright)}
  .btn-ghost{background:transparent;border-color:var(--line);color:var(--ink)}
  .btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
  .hero-stats{display:flex;gap:48px;margin-top:56px;flex-wrap:wrap;justify-content:center}
  .hero-stats .s .n{font-family:'Oswald',sans-serif;font-weight:700;font-size:38px;color:var(--gold)}
  .hero-stats .s .l{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}

  .sec-head{display:flex;justify-content:space-between;align-items:flex-end;gap:24px;margin-bottom:40px;flex-wrap:wrap}
  .sec-head h2{font-size:clamp(30px,5vw,52px)}
  .sec-head p{color:var(--muted);max-width:440px}

  /* ROSTER GRID */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:18px}

  /* FEATURED FIGHT */
  .featured-fight{background:var(--panel);border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%}
  .ff-fighters{display:grid;grid-template-columns:1fr 64px 1fr;gap:0;width:100%}
  .ff-fighter{position:relative;overflow:hidden;cursor:pointer;display:flex;flex-direction:column}
  .ff-img{aspect-ratio:3/4;overflow:hidden;background:var(--bg-2);width:100%}
  .ff-img img{width:100%;height:100%;object-fit:contain;object-position:top center;transition:transform .5s ease;display:block}
  .ff-fighter:hover .ff-img img{transform:scale(1.02)}
  .ff-fighter-accent{height:3px;width:100%;flex-shrink:0}
  .ff-info{padding:16px 20px;text-align:center;background:var(--panel);flex-shrink:0}
  .ff-name{font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(16px,2vw,22px);text-transform:uppercase;color:var(--ink);transition:color .2s}
  .ff-fighter:hover .ff-name{color:var(--gold)}
  .ff-alias{font-size:12px;color:var(--gold);margin:3px 0}
  .ff-nation{font-size:11px;color:var(--muted);margin-top:3px;letter-spacing:.06em}
  .ff-vs{display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg-2);border-left:1px solid var(--line);border-right:1px solid var(--line);flex-shrink:0}
  .ff-vs-glyph{font-size:32px;color:var(--gold);font-family:'Noto Serif SC',serif;line-height:1}
  .ff-vs-label{font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-top:10px;writing-mode:vertical-rl;text-orientation:mixed}
  .ff-poll{grid-column:1/-1;padding:0;border-top:1px solid var(--line);background:var(--panel)}
  .ff-cta{display:flex;gap:12px;justify-content:center;align-items:center;flex-wrap:wrap;padding:20px 24px;border-top:1px solid var(--line);grid-column:1/-1}
  .ff-cta .btn,.ff-cta a.btn{flex:0 0 auto;width:auto;font-size:13px;padding:11px 24px}
  .ff-poll-header{display:flex;justify-content:center;align-items:center;gap:12px;padding:12px 20px 0}
  .ff-poll-label{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold)}
  .ff-poll-status{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}
  .ff-poll-bar{display:flex;gap:2px;padding:10px 20px 14px}
  .ff-poll-side{flex:1;border:1px solid var(--line);border-radius:3px;padding:12px 16px;cursor:pointer;background:transparent;display:flex;justify-content:space-between;align-items:center;transition:.2s;font-family:'Oswald',sans-serif}
  .ff-poll-side:hover{border-color:var(--gold);background:rgba(212,165,40,.06)}
  .ff-poll-name{font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink)}
  .ff-poll-pct{font-size:15px;font-weight:700;color:var(--gold);min-width:40px;text-align:right;opacity:0;transition:opacity .3s}
  .ff-poll.voted .ff-poll-pct{opacity:1}
  .ff-poll.voted .ff-poll-side{cursor:default}
  .ff-poll.voted .ff-poll-side.selected{border-color:var(--gold);background:rgba(212,165,40,.1)}
  .ff-poll.voted .ff-poll-side:not(.selected){opacity:.5}
  .ff-poll-fill{height:4px;margin:0 20px 14px;border-radius:2px;background:var(--line);overflow:hidden;display:flex}
  .ff-poll-fill-left,.ff-poll-fill-right{height:100%;transition:width .6s ease}
  .ff-poll-fill-left{background:var(--gold);border-radius:2px 0 0 2px}
  .ff-poll-fill-right{background:var(--emerald,#1f9e6b);border-radius:0 2px 2px 0}
  .ff-poll.closed .ff-poll-side{cursor:default;opacity:.6}
  .ff-poll.closed .ff-poll-label{color:var(--muted)}
  @media(max-width:600px){
    .ff-fighters{grid-template-columns:1fr 48px 1fr}
    .ff-vs-glyph{font-size:22px}
    .ff-vs-label{display:none}
    .ff-info{padding:12px}
  }
  @media(max-width:400px){
    .ff-fighters{grid-template-columns:1fr;height:auto}
    .ff-vs{flex-direction:row;height:48px;border:none;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
    .ff-vs-label{writing-mode:horizontal-tb;margin-top:0;margin-left:8px}
  }

  /* ROSTER FILTER */
  .filter-bar{margin-bottom:32px}
  .filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
  .filter-row:last-child{margin-bottom:0}
  .filter-label{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);min-width:80px;flex-shrink:0}
  .fsort{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:5px 12px;border:1px solid var(--line);border-radius:2px;cursor:pointer;background:transparent;color:var(--muted);transition:.15s}
  .fsort.active{color:var(--gold);border-color:var(--gold)}
  .fsort:hover{border-color:var(--gold);color:var(--ink)}
  .fpill{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:5px 12px;border:1px solid var(--line);border-radius:2px;cursor:pointer;background:transparent;color:var(--muted);transition:.15s;white-space:nowrap}
  .fpill:hover{border-color:var(--gold);color:var(--ink)}
  .fpill.active{background:var(--gold);border-color:var(--gold);color:#0a0c0b}
  .filter-count{font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:.1em;color:var(--muted);margin-top:12px}
  .filter-count b{color:var(--gold)}
  .card.hidden{display:none}
  .card{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:4px;overflow:hidden;cursor:pointer;transition:.25s}
  .card:hover{transform:translateY(-4px);border-color:var(--gold)}
  .card .imgwrap{aspect-ratio:3/4;overflow:hidden;background:linear-gradient(160deg,#1a1c16,#0e110d)}
  .card .imgwrap img{width:100%;height:100%;object-fit:cover;object-position:top center;transition:.4s}
  .card:hover .imgwrap img{transform:scale(1.05)}
  .ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted);font-family:'Oswald',sans-serif;letter-spacing:.15em;text-transform:uppercase;font-size:12px;text-align:center;padding:20px}
  .ph .accent{width:42px;height:3px;border-radius:2px}
  .card .body{padding:16px 18px 20px}
  .card .flag{font-size:13px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase}
  .fi{width:1.25em;height:0.9em;border-radius:1px;vertical-align:-1px;box-shadow:0 0 0 1px rgba(0,0,0,.15)}
  .card .nm{font-family:'Oswald',sans-serif;font-weight:700;font-size:22px;margin-top:2px}
  .card .al{font-size:13px;color:var(--gold);font-style:italic;margin-top:1px}
  .card .meta{display:flex;justify-content:space-between;margin-top:14px;padding-top:12px;border-top:1px solid var(--line);font-size:12px;color:var(--muted)}
  .card .meta b{color:var(--ink);font-weight:600}
  .card .stripe{position:absolute;top:0;left:0;width:4px;height:100%;z-index:3}

  /* FIGHTER PROFILE */
  .fp-back-bar{padding:16px 0 12px;margin-bottom:16px}
  .fp-back{display:inline-flex;gap:8px;align-items:center;color:var(--muted);font-size:13px;letter-spacing:.1em;text-transform:uppercase;font-family:'Oswald',sans-serif;cursor:pointer}
  .fp-back:hover{color:var(--gold)}
  /* Fixed floating back button — appears on scroll */
  .fp-float{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,11,8,.95);backdrop-filter:blur(8px);padding:12px 24px;border-bottom:1px solid var(--line);box-shadow:0 4px 16px rgba(0,0,0,.4);transform:translateY(-100%);transition:transform .25s ease;display:none}
  .fp-float.visible{transform:translateY(0)}
  .fp-float .fp-float-inner{max-width:var(--maxw);margin:0 auto;display:flex;justify-content:space-between;align-items:center}
  .fp-float .fp-back{font-size:12px}
  .fp-float .fp-float-name{font-family:'Oswald',sans-serif;font-weight:600;font-size:14px;letter-spacing:.04em}
  .fp{display:grid;grid-template-columns:minmax(0,420px) 1fr;gap:48px;align-items:start}
  .fp-img{aspect-ratio:3/4;border-radius:6px;overflow:hidden;border:1px solid var(--line);background:linear-gradient(160deg,#1a1c16,#0e110d);position:relative}
  .fp-img img{width:100%;height:100%;object-fit:cover;object-position:top center}
  .fp-flag{font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted)}
  .fp h1{font-size:clamp(42px,7vw,76px);margin:6px 0}
  .fp .alias{font-family:'Oswald',sans-serif;font-style:italic;color:var(--gold);font-size:22px;font-weight:500;letter-spacing:.04em}
  .fp .rec{display:flex;margin:28px 0;border:1px solid var(--line);border-radius:4px;overflow:hidden;max-width:360px}
  .fp .rec .r{flex:1;text-align:center;padding:16px 8px;border-right:1px solid var(--line)}
  .fp .rec .r:last-child{border-right:0}
  .fp .rec .r .n{font-family:'Oswald',sans-serif;font-weight:700;font-size:32px;color:var(--gold)}
  .fp .rec .r .l{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
  .fp .tags{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:22px}
  .fp .tag{font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:.12em;text-transform:uppercase;padding:6px 14px;border:1px solid var(--line);border-radius:2px;color:var(--muted)}
  .fp .tag b{color:var(--ink);font-weight:600}
  .fp .bio{color:#cdc8ba;font-size:16px;line-height:1.75;margin-bottom:28px;max-width:660px}
  .fp .bio-block{margin-bottom:20px}
  .fp .bio-block:last-child{margin-bottom:0}
  .fp .bio-label{display:block;font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:.18em;text-transform:uppercase;font-size:11px;color:var(--gold);margin-bottom:5px}
  .fp .bio-block p{margin:0}
  .fname{color:var(--gold);font-weight:600;cursor:pointer;border-bottom:1px solid rgba(212,165,40,.35);transition:.15s;white-space:nowrap}
  .fname:hover{color:var(--gold-bright);border-color:var(--gold-bright)}
  .fp .specs{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:560px;margin-bottom:32px}
  .fp .specs .sp{background:var(--panel);border:1px solid var(--line);border-radius:4px;padding:14px}
  .fp .specs .sp .l{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .fp .specs .sp .v{font-family:'Oswald',sans-serif;font-weight:600;font-size:18px;margin-top:3px}
  .watch{display:flex;gap:14px;flex-wrap:wrap}

  /* MATCHUP / VS CARD */
  .mu{display:grid;gap:16px;max-width:880px;margin:0 auto}
  .mu-card{background:var(--panel);border:1px solid var(--line);border-radius:6px;overflow:hidden;display:grid;grid-template-columns:1fr auto 1fr;align-items:stretch}
  .mu-side{padding:24px;display:flex;flex-direction:column;justify-content:center;gap:4px}
  .mu-side.right{text-align:right;align-items:flex-end}
  .mu-side .nm{font-family:'Oswald',sans-serif;font-weight:700;font-size:24px}
  .mu-name{cursor:pointer;transition:color .15s}.mu-name:hover{color:var(--gold)}
  .mu-side .al{color:var(--gold);font-style:italic;font-size:13px}
  .mu-side .rc{color:var(--muted);font-size:13px;margin-top:6px;letter-spacing:.08em}
  .mu-vs{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 18px;background:linear-gradient(180deg,rgba(212,165,40,.08),rgba(31,158,107,.08));border-left:1px solid var(--line);border-right:1px solid var(--line)}
  .mu-vs .v{font-family:'Noto Serif SC',serif;font-weight:700;font-size:30px;color:var(--gold)}
  .mu-vs .tag{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:4px;text-align:center}

  /* REQUEST FORM SECTION */
  .request{background:linear-gradient(160deg,rgba(31,158,107,.08),rgba(212,165,40,.05));border:1px solid var(--line);border-radius:8px;padding:48px;text-align:center;max-width:760px;margin:0 auto}
  .request h3{font-size:clamp(28px,4vw,44px);margin-bottom:14px}
  .request p{color:var(--muted);max-width:480px;margin:0 auto 28px;font-size:16px}

  /* RECORDS / PAST FIGHTS */
  .records{max-width:820px;margin:0 auto}
  .empty-state{text-align:center;padding:56px 24px;border:1px dashed var(--line);border-radius:8px;background:var(--panel)}
  .empty-state .badge{font-family:'Oswald',sans-serif;letter-spacing:.2em;text-transform:uppercase;font-size:13px;color:var(--gold)}
  .empty-state h3{font-size:28px;margin:12px 0 10px}
  .empty-state p{color:var(--muted);max-width:440px;margin:0 auto}
  /* FIGHT LOG */
  .fight-log{display:flex;flex-direction:column;gap:10px}
  .fight-row{display:grid;grid-template-columns:1fr auto;gap:8px 20px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:16px 20px}
  .fr-event{grid-column:1;font-family:'Oswald',sans-serif;letter-spacing:.14em;text-transform:uppercase;font-size:11px;color:var(--gold);display:flex;gap:10px;align-items:center}
  .fr-date{color:var(--muted);letter-spacing:.08em}
  .fr-result{grid-column:1;font-family:'Oswald',sans-serif;font-size:18px;font-weight:600;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .fr-winner{color:var(--ink);cursor:pointer;border-bottom:1px solid var(--gold)}
  .fr-winner:hover{color:var(--gold)}
  .fr-def{color:var(--muted);font-size:13px;font-weight:400;font-style:italic}
  .fr-loser{color:var(--muted);cursor:pointer}
  .fr-loser:hover{color:var(--ink)}
  .fr-method{grid-column:2;grid-row:1/3;font-family:'Oswald',sans-serif;letter-spacing:.1em;text-transform:uppercase;font-size:13px;color:var(--ink);text-align:right;align-self:center}

  /* LARGE FIGHT IMAGE */
  .rc-face{display:block;width:100%;aspect-ratio:3/4;border-radius:8px;overflow:hidden;background:linear-gradient(160deg,#1a1c16,#0e110d);border:2px solid var(--accent);transition:border-color .2s}
  .rc-face img{width:100%;height:100%;object-fit:cover;object-position:top center}
  .rc-face.noimg{position:relative}
  .rc-face.noimg::after{content:'No Image';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-family:'Oswald',sans-serif;letter-spacing:.12em;text-transform:uppercase;font-size:12px;opacity:.5}

  /* RECORDS — large cards (results shown, no shop link) */
  .rec-cards{display:flex;flex-direction:column;gap:20px}
  .rec-card{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden;padding:18px}
  .rc-event{font-family:'Oswald',sans-serif;letter-spacing:.16em;text-transform:uppercase;font-size:12px;color:var(--gold);text-align:center;margin-bottom:18px}
  .rc-date{color:var(--muted)}
  .rc-body{display:grid;grid-template-columns:1fr auto 1fr;gap:20px;align-items:center}
  .rc-side{cursor:pointer;text-align:center;max-width:260px;justify-self:center;width:100%}
  .rc-side .rc-name{font-family:'Oswald',sans-serif;font-weight:600;font-size:20px;margin-top:12px}
  .rc-side:hover .rc-name{color:var(--gold)}
  .rc-tag{display:inline-block;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.16em;padding:3px 12px;border-radius:3px;margin-top:8px}
  .rc-tag.win{background:var(--emerald-deep,#1f5c43);color:#dffbef}
  .rc-tag.loss{background:rgba(255,255,255,.06);color:var(--muted)}
  .rc-mid{text-align:center;display:flex;flex-direction:column;gap:6px;min-width:90px}
  .rc-glyph{font-family:'Noto Serif SC',serif;color:var(--gold);font-size:26px}
  .rc-method{font-family:'Oswald',sans-serif;font-weight:600;font-size:14px;letter-spacing:.1em;text-transform:uppercase}
  .rc-round{font-size:12px;color:var(--muted)}
  /* SPOILER REVEAL — result hidden until user opts in */
  .rec-card .rc-tag,
  .rec-card .rc-method,
  .rec-card .rc-round{display:none}
  .rec-card.revealed .rc-tag,
  .rec-card.revealed .rc-method,
  .rec-card.revealed .rc-round{display:inline-block}
  .rc-reveal-btn{font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);background:transparent;border:1px solid var(--gold);border-radius:3px;padding:8px 16px;cursor:pointer;transition:all .15s;margin-top:6px}
  .rc-reveal-btn:hover{background:var(--gold);color:#0a0b08}
  .rc-shop-btn{display:inline-block;font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:#0a0b08;background:var(--gold);border:1px solid var(--gold);border-radius:3px;padding:8px 16px;cursor:pointer;text-decoration:none;margin-top:8px;transition:all .15s}
  .rc-shop-btn:hover{opacity:.85}
  .rec-card .rc-side .rc-name{transition:color .15s}
  .rec-card:not(.revealed) .rc-tag-placeholder{display:inline-block;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.16em;padding:3px 12px;border-radius:3px;margin-top:8px;background:rgba(255,255,255,.04);color:var(--muted)}
  .rec-card.revealed .rc-tag-placeholder{display:none}
  /* Face borders: neutral until revealed, then green (win) / red (loss) */
  .rec-card:not(.revealed) .rc-face{border-color:var(--line)!important}
  .rec-card.revealed .rc-side.win .rc-face{border-color:#1f9e6b!important}
  .rec-card.revealed .rc-side.loss .rc-face{border-color:#c0263a!important}

  /* WATCH — large cards (no result, links to shop) */
  .watch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:20px}
  .watch-card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:20px;cursor:pointer;transition:.2s}
  .watch-card:hover{border-color:var(--gold);transform:translateY(-3px)}
  .wc-event{font-family:'Oswald',sans-serif;letter-spacing:.16em;text-transform:uppercase;font-size:12px;color:var(--gold);text-align:center;margin-bottom:18px}
  .wc-body{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:center}
  .wc-side{text-align:center;max-width:200px;justify-self:center;width:100%}
  .wc-side .wc-name{font-family:'Oswald',sans-serif;font-weight:600;font-size:17px;margin-top:10px}
  .wc-mid{font-family:'Noto Serif SC',serif;color:var(--gold);font-size:24px}
  .wc-cta{text-align:center;margin-top:18px;padding-top:16px;border-top:1px solid var(--line);font-family:'Oswald',sans-serif;letter-spacing:.12em;text-transform:uppercase;font-size:13px;color:var(--gold)}

  /* COMMISSION PICKER */
  .comm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-top:24px}
  .comm-card{position:relative;background:var(--panel);border:2px solid var(--line);border-radius:6px;overflow:hidden;cursor:pointer;transition:.2s;text-align:center;padding-bottom:12px}
  .comm-card:hover{border-color:var(--gold);transform:translateY(-2px)}
  .comm-card.selected{border-color:var(--gold);box-shadow:0 0 16px rgba(212,165,40,.3)}
  .comm-card.selected::after{content:'✓';position:absolute;top:8px;right:8px;width:24px;height:24px;background:var(--gold);color:#0a0b08;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
  .comm-card.disabled{opacity:.35;pointer-events:none}
  .comm-card .comm-img{width:100%;aspect-ratio:3/4;background:linear-gradient(160deg,#1a1c16,#0e110d);overflow:hidden}
  .comm-card .comm-img img{width:100%;height:100%;object-fit:cover;object-position:top center}
  .comm-card .comm-nm{font-family:'Oswald',sans-serif;font-weight:600;font-size:14px;margin-top:8px;padding:0 8px}
  .comm-card .comm-al{font-size:12px;color:var(--gold);font-style:italic;padding:0 8px}
  .comm-card .comm-fl{font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:.08em}
  .comm-profile-link{display:block;font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:8px;padding:0 8px;text-decoration:none;transition:.15s}
  .comm-profile-link:hover{color:var(--gold)}
  .comm-selected{display:flex;gap:20px;align-items:center;justify-content:center;margin:28px 0;flex-wrap:wrap}
  .comm-pick{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:14px 24px;text-align:center;min-width:200px}
  .comm-pick .cp-label{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
  .comm-pick .cp-name{font-family:'Oswald',sans-serif;font-weight:600;font-size:18px}
  .comm-pick.empty .cp-name{color:var(--muted);font-weight:400;font-style:italic}
  .comm-vs{font-family:'Noto Serif SC',serif;color:var(--gold);font-size:28px}
  .comm-submit{text-align:center;margin-top:8px}
  .comm-submit .btn{padding:14px 36px;font-size:15px}
  .comm-submit .btn[disabled]{opacity:.3;pointer-events:none}
  .comm-note{text-align:center;color:var(--muted);font-size:13px;margin-top:16px;max-width:500px;margin-left:auto;margin-right:auto}

  /* SHOP / ABOUT */
  .lead{font-size:clamp(20px,3vw,30px);font-family:'Oswald',sans-serif;font-weight:400;line-height:1.4;max-width:780px;color:var(--ink);letter-spacing:.005em}
  .sec-head p, .hero .sub{font-family:'Barlow',sans-serif}
  .prose{color:#cdc8ba;font-size:17px;line-height:1.8;max-width:680px;margin-top:20px}
  .prose p{margin-bottom:18px}
  .shop-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-top:40px}

  /* THE VAULT — editorial/media hub */
  .vault-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px;margin-top:40px}
  .vault-card{background:var(--panel);border:1px solid var(--line);border-radius:6px;overflow:hidden;cursor:pointer;transition:.2s;display:flex;flex-direction:column}
  .vault-card:hover{border-color:var(--gold);transform:translateY(-3px)}
  .vault-thumb{width:100%;aspect-ratio:16/9;background:var(--bg-2);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
  .vault-thumb img{width:100%;height:100%;object-fit:cover}
  .vault-thumb-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--bg-2),var(--panel))}
  .vault-type{position:absolute;top:10px;left:10px;font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.18em;text-transform:uppercase;padding:4px 10px;border-radius:2px;font-weight:600}
  .vault-type.interview{background:var(--gold);color:#0a0c0b}
  .vault-type.presser{background:var(--emerald);color:#fff}
  .vault-type.spotlight{background:#c86b2e;color:#fff}
  .vault-type.video{background:#1a1a2e;color:var(--gold);border:1px solid var(--gold)}
  .vault-play{width:48px;height:48px;border-radius:50%;background:rgba(212,165,40,.9);display:flex;align-items:center;justify-content:center;font-size:20px;color:#0a0c0b}
  .vault-body{padding:20px;flex:1;display:flex;flex-direction:column}
  .vault-fighter{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
  .vault-title{font-family:'Oswald',sans-serif;font-weight:700;font-size:20px;line-height:1.2;margin-bottom:8px;color:var(--ink)}
  .vault-teaser{font-size:13px;color:var(--muted);flex:1;line-height:1.6}
  .vault-meta{margin-top:14px;font-size:11px;color:var(--muted);letter-spacing:.08em}
  .vault-empty{text-align:center;padding:80px 24px;color:var(--muted)}
  .vault-empty .glyph{font-size:48px;display:block;margin-bottom:16px;opacity:.3}
  /* Vault article layouts */
  .vault-hero-img{width:100%;max-height:520px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:var(--bg-2);margin-bottom:0}
  .vault-hero-img img{width:100%;height:520px;object-fit:cover;object-position:top}
  .vault-hero-placeholder{height:320px}
  .vault-split{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:start;margin-top:40px}
  .vault-split-img{position:sticky;top:100px}
  .vault-split-img img{width:100%;border-radius:4px;object-fit:cover;object-position:top;max-height:700px}
  .vault-split-placeholder{height:500px;background:var(--bg-2);border-radius:4px;display:flex;align-items:center;justify-content:center}
  .vault-split-text{padding-top:0}
  .vault-article-title{font-size:clamp(26px,4vw,46px);line-height:1.1;margin:10px 0 12px}
  .vault-article-date{color:var(--muted);font-size:13px;margin-bottom:36px;padding-bottom:20px;border-bottom:1px solid var(--line)}
  .vault-article-body p{margin-bottom:1.4em;line-height:1.8;font-size:16px;color:var(--ink)}
  .vault-article-body h3{font-family:'Oswald',sans-serif;font-weight:700;font-size:20px;letter-spacing:.08em;text-transform:uppercase;margin:2em 0 .8em;color:var(--gold)}
  .vault-article-body strong{color:var(--ink);font-weight:600}
  .vault-lead{font-size:19px!important;font-weight:500;line-height:1.7!important;color:var(--ink)!important}
  .vault-speaker{padding-left:20px;border-left:3px solid var(--gold);color:var(--muted)!important;font-style:italic;margin:1em 0!important}
  .vault-quote{font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;color:var(--gold);padding:28px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);margin:36px 0;line-height:1.3}
  .vault-quote span{display:block;font-size:14px;font-weight:400;color:var(--muted);margin-top:8px;font-family:'Barlow',sans-serif;font-style:italic}
  @media(max-width:768px){.vault-split{grid-template-columns:1fr;gap:32px}.vault-split-img{position:static}}
  /* VENUES */
  .venue-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:24px}
  .venue-card{background:var(--panel);border:1px solid var(--line);border-radius:4px;overflow:hidden;display:flex;flex-direction:column}
  .venue-accent{height:4px;width:100%;flex-shrink:0}
  .venue-body{padding:28px 24px;display:flex;flex-direction:column;gap:16px}
  .venue-header{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
  .venue-name{font-family:'Oswald',sans-serif;font-weight:700;font-size:24px;text-transform:uppercase;color:var(--ink)}
  .venue-subtitle{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-top:4px}
  .venue-type-badge{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.14em;text-transform:uppercase;background:var(--bg-2);color:var(--muted);padding:5px 10px;border-radius:2px;border:1px solid var(--line);white-space:nowrap;flex-shrink:0}
  .venue-desc{font-size:14px;color:var(--muted);line-height:1.75}
  .venue-atmosphere{font-size:13px;color:var(--muted);opacity:.8;font-style:italic}
  .venue-fights{display:flex;flex-direction:column;gap:6px;padding-top:14px;border-top:1px solid var(--line)}
  .venue-fights-label{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold)}
  .venue-fight-tag{font-size:12px;color:var(--muted)}
  .venue-thumb{width:100%;aspect-ratio:16/9;overflow:hidden;background:var(--bg-2)}
  .venue-thumb-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .venue-card-footer{margin-top:12px;padding-top:12px;border-top:1px solid var(--line)}
  .venue-read-more{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold)}
  .venue-card{cursor:pointer;transition:border-color .2s,transform .2s}
  .venue-card:hover{border-color:var(--gold);transform:translateY(-2px)}
  .vault-video-wrap{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:4px;margin:32px 0;background:var(--bg-2)}
  .vault-video-tiktok{padding-bottom:0;height:auto;max-width:340px;margin-left:auto;margin-right:auto}
  .vault-video-tiktok iframe{position:static;width:100%;height:600px;border-radius:8px}
  .vault-video-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0;border-radius:4px}
  .vault-video-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;background:var(--bg-2);border-radius:4px;margin:32px 0;border:1px dashed var(--line)}
  .shop-card{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:32px;display:flex;flex-direction:column}
  .shop-card .k{font-family:'Oswald',sans-serif;letter-spacing:.2em;text-transform:uppercase;font-size:13px;color:var(--gold)}
  .shop-card h3{font-size:28px;margin:10px 0 8px}
  .shop-card p{color:var(--muted);font-size:15px;flex:1;margin-bottom:22px}
  .shop-card .btn{align-self:flex-start}
  .note{margin-top:28px;padding:16px 20px;border-left:3px solid var(--emerald);background:rgba(31,158,107,.06);color:var(--muted);font-size:14px;max-width:680px;border-radius:0 4px 4px 0}

  /* PROFILE QUOTES */
  .quotes-sec{margin-top:28px;padding-top:28px;border-top:1px solid var(--line);margin-bottom:28px}
  .fp-bottom-nav{margin-top:48px;padding-top:32px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
  .fp-bottom-nav .btn{cursor:pointer}
  .fp-nav-center{flex:1;text-align:center}
  .quotes-grid{display:flex;flex-direction:column;gap:18px;max-width:760px}
  .fq{position:relative;background:var(--panel);border-left:3px solid var(--gold);border-radius:0 4px 4px 0;padding:18px 22px;margin:0}
  .fq-native{display:block;font-family:'Oswald',sans-serif;font-weight:500;font-size:18px;line-height:1.4;color:var(--ink);letter-spacing:.01em}
  .fq-trans{display:block;margin-top:8px;font-size:14px;color:var(--muted);font-style:italic}

  /* PROFILE GALLERY */
  .gallery-sec{margin-top:48px;padding-top:40px;border-top:1px solid var(--line)}
  .gallery-sec .gh{font-family:'Oswald',sans-serif;font-weight:700;font-size:24px;letter-spacing:.04em;margin-bottom:6px}
  .gallery-sec .gsub{color:var(--muted);font-size:14px;margin-bottom:24px}
  .gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
  .gtile{aspect-ratio:3/4;border:1px solid var(--line);border-radius:4px;overflow:hidden;background:linear-gradient(160deg,#1a1c16,#0e110d);position:relative}
  .gtile img{width:100%;height:100%;object-fit:cover;object-position:top center}
  .gtile-click{cursor:zoom-in}
  .gtile-click img{transition:transform .3s}
  .gtile-click:hover img{transform:scale(1.06)}
  /* LIGHTBOX */
  .lightbox{position:fixed;inset:0;z-index:200;background:rgba(8,9,8,.92);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:32px;cursor:zoom-out}
  .lightbox.open{display:flex}
  .lightbox-figure{margin:0;max-width:min(92vw,820px);max-height:90vh;display:flex;flex-direction:column;align-items:center;gap:12px}
  .lightbox-figure img{max-width:100%;max-height:82vh;object-fit:contain;border:1px solid var(--line);border-radius:6px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
  .lightbox-figure figcaption{font-family:'Oswald',sans-serif;letter-spacing:.14em;text-transform:uppercase;font-size:12px;color:var(--muted)}
  .lightbox-close{position:absolute;top:20px;right:26px;background:none;border:0;color:var(--ink);font-size:40px;line-height:1;cursor:pointer;transition:.2s}
  .lightbox-close:hover{color:var(--gold)}
  .gtile .gph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-family:'Oswald',sans-serif;letter-spacing:.14em;text-transform:uppercase;font-size:11px;opacity:.5}

  /* MATCHUP CAROUSEL */
  .carousel{max-width:960px;margin:0 auto}
  .carousel-stage{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .vs-full{display:grid;grid-template-columns:1fr auto 1fr;align-items:stretch;min-height:440px}
  .vs-fighter{padding:32px 28px;display:flex;flex-direction:column;justify-content:flex-end;position:relative;overflow:hidden}
  .vs-fighter .vimg{position:absolute;inset:0;z-index:0}
  .vs-fighter .vimg img{width:100%;height:100%;object-fit:cover;object-position:top center;opacity:.55}
  .vs-fighter .vph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted);font-family:'Oswald',sans-serif;letter-spacing:.14em;text-transform:uppercase;font-size:12px;z-index:0}
  .vs-fighter .vph .accent{width:42px;height:3px;border-radius:2px}
  .vs-fighter::after{content:"";position:absolute;inset:0;z-index:1;background:linear-gradient(180deg,rgba(10,12,11,.2),rgba(10,12,11,.92))}
  .vs-fighter .vinfo{position:relative;z-index:2}
  .vs-fighter.right{text-align:right}
  .vs-fighter .vflag{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
  .vs-fighter .vname{font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(26px,4vw,40px);line-height:1.05;margin:4px 0}
  .vs-fighter .valias{color:var(--gold);font-style:italic;font-size:15px}
  .vs-fighter .vrec{margin-top:14px;font-size:13px;color:var(--muted);letter-spacing:.06em}
  .vs-fighter .vrec b{color:var(--ink)}
  .vs-mid{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 20px;background:linear-gradient(180deg,rgba(212,165,40,.1),rgba(31,158,107,.1));border-left:1px solid var(--line);border-right:1px solid var(--line);z-index:3}
  .vs-mid .glyph{font-family:'Noto Serif SC',serif;font-weight:700;font-size:40px;color:var(--gold)}
  .vs-mid .label{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-top:8px;text-align:center;max-width:90px}
  .carousel-nav{display:flex;align-items:center;justify-content:space-between;margin-top:20px;gap:16px}
  .cbtn{width:52px;height:52px;border-radius:50%;border:1px solid var(--line);background:var(--panel);color:var(--ink);font-size:22px;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .cbtn:hover{border-color:var(--gold);color:var(--gold)}
  .carousel-dots{display:flex;gap:8px;align-items:center}
  .cdot{width:8px;height:8px;border-radius:50%;background:var(--line);cursor:pointer;transition:.2s;border:0;padding:0}

<script>
  // ===== EDIT THESE LINKS =====

  const f = (id)=>FIGHTERS.find(x=>x.id===id);
  // Map nationality -> ISO 3166-1 alpha-2 for flag-icons
  const FLAG_CC = {

  };
  function flagHTML(nat){
    const cc = FLAG_CC[nat];
    return cc ? `<span class="fi fi-${cc}"></span>` : '';
  }
  function recStr(r){return `${r.w}-${r.l}${r.ko?` (${r.ko} KO)`:''}`;}

  window.placeholderHTML = (color,nat,disc)=>`
    <div class="ph"><div class="accent" style="background:${color}"></div>

  }

  function home(){

    return `

    <section>

            </div>
            <div class="ff-fighter-accent" style="background:#4ac86b"></div>
            <div class="ff-info">
              <div class="ff-name">Pei Yee Lim</div>

              <div class="ff-nation">🇲🇾 Malaysia · Kickboxing</div>
            </div>
          </div>
          <div class="ff-poll" id="ff-poll-1">

              <span class="ff-poll-label">WHO WINS?</span>
              <span class="ff-poll-status" id="poll-status-1"></span>

            <div class="ff-poll-bar" id="poll-bar-1">

                <span class="ff-poll-name">Cheryl Ong</span>

                <span class="ff-poll-name">Pei Yee Lim</span>

            <button class="btn btn-ghost" onclick="go('vault')">The Vault</button>
          </div>
        </div>
      </div>
    </section>

    <section style="border-top:1px solid var(--line)">
      <div class="wrap">
        <div class="sec-head"><div><span class="eyebrow">The Stable</span><h2>The Fighters</h2></div>
        <p>Every fighter carries a record and a reason. Click through.</p></div>
        <div class="grid">${shuffleFighters().slice(0,8).map(card).join('')}</div>
        <div style="text-align:center;margin-top:30px"><button class="btn btn-gold" onclick="go('roster')">All Fighters</button></div>
      </div>
    </section>

    <section style="border-top:1px solid var(--line)">
      <div class="wrap">
        <div class="request">
          <span class="eyebrow">Make the Card</span>
          <h3>Commission a Matchup</h3>
          <p>Want to see two specific fighters meet? Get in touch for a quote — all commissions are paid productions.</p>
          <span class="btn btn-gold" onclick="go('commission')">Pick Your Fighters</span>
        </div>
      </div>
    </section>`;
  }

  function card(ft){
    return `<div class="card" onclick="go('fighter/${ft.id}')" role="button" tabindex="0" aria-label="${ft.name}, ${ft.nationality} ${ft.baseStyle}" onkeydown="if(event.key==='Enter'||event.key===' ')go('fighter/${ft.id}')">
      <div class="stripe" style="background:${ft.color}"></div>
      <div class="imgwrap">${imgOrPlaceholder(ft)}</div>
      <div class="body">
        <div class="flag">${flagHTML(ft.nationality)} ${ft.nationality}</div>
        <div class="nm">${ft.name}</div>
        <div class="al">“${ft.alias}”</div>
        <div class="meta"><span>${ft.baseStyle}</span></div>
      </div></div>`;
  }

  // ── ROSTER FILTER STATE ──
  let rosterFilter = { nation: [], discipline: null };
  let rosterSort = "name";

  function applyRosterFilter(){
    const grid = document.querySelector('.roster-grid');
    if(!grid) return;
    const cards = [...grid.querySelectorAll('.card')];
    // Sort
    cards.sort((a,b)=>{
      if(rosterSort==='nation') return a.dataset.nation.localeCompare(b.dataset.nation)||a.dataset.name.localeCompare(b.dataset.name);
      if(rosterSort==='discipline') return a.dataset.discipline.localeCompare(b.dataset.discipline)||a.dataset.name.localeCompare(b.dataset.name);
      if(rosterSort==='debut') return (a.dataset.debut||'').localeCompare(b.dataset.debut||'')||a.dataset.name.localeCompare(b.dataset.name);
      return a.dataset.name.localeCompare(b.dataset.name); // default A-Z
    });
    cards.forEach(c=>grid.appendChild(c));
    // Filter
    let visible = 0;
    cards.forEach(el => {
      const n = el.dataset.nation;
      const d = el.dataset.discipline;
      const show = (rosterFilter.nation.length === 0 || rosterFilter.nation.includes(n)) &&
                   (!rosterFilter.discipline || rosterFilter.discipline === d);
      el.classList.toggle('hidden', !show);
      if(show) visible++;
    });
    const counter = document.getElementById('roster-count');
    const activeNations = rosterFilter.nation.length;
    const filterDesc = activeNations > 1 ? ` · ${activeNations} nations` : '';
    if(counter) counter.innerHTML = `Showing <b>${visible}</b> of <b>${FIGHTERS.length}</b> fighters${filterDesc}`;
  }

  window.rosterSortBy = function(val){
    rosterSort = val;
    document.querySelectorAll('.fsort').forEach(b=>b.classList.toggle('active', b.dataset.sort===val));
    applyRosterFilter();
  };

  window.rosterPill = function(type, value, el){
    if(type === 'nation'){
      // Multi-select: toggle in/out of array
      const idx = rosterFilter.nation.indexOf(value);
      if(idx > -1){
        rosterFilter.nation.splice(idx, 1);
      } else {
        rosterFilter.nation.push(value);
      }
    } else {
      // Discipline: single select (toggle off if same)
      rosterFilter[type] = rosterFilter[type] === value ? null : value;
    }
    // Update pill active states
    document.querySelectorAll(`.fpill[data-type="${type}"]`).forEach(p => {
      if(type === 'nation'){
        p.classList.toggle('active', rosterFilter.nation.includes(p.dataset.value));
      } else {
        p.classList.toggle('active', p.dataset.value === rosterFilter[type]);
      }
    });
    applyRosterFilter();
  };

  function roster(){
    const nations = [...new Set(FIGHTERS.map(x=>x.nationality))].sort();
    const disciplines = [...new Set(FIGHTERS.map(x=>x.baseStyle))].sort();
    // Note: rosterFilter is NOT reset here — reset is handled in render() only when
    // navigating to roster from outside a fighter profile

    const nationPills = nations.map(n =>
      `<button class="fpill" data-type="nation" data-value="${n}" onclick="rosterPill('nation','${n}',this)">${n}</button>`
    ).join('');

    const discPills = disciplines.map(d =>
      `<button class="fpill" data-type="discipline" data-value="${d}" onclick="rosterPill('discipline','${d}',this)">${d}</button>`
    ).join('');

    const sorted = [...FIGHTERS].sort((a,b)=>a.name.localeCompare(b.name));

    return `<section><div class="wrap">
      <span class="eyebrow">${nations.length} Nations · One Division</span>
      <div class="sec-head"><h2>The Fighters</h2><p>Boxers, Muay Thai killers, Sambo grapplers, street fighters.</p><p style="color:var(--gold);font-family:'Oswald',sans-serif;font-size:18px;font-weight:600;letter-spacing:.08em;margin-top:8px">Pick your Fighter.</p></div>
      <div class="filter-bar">
        <div class="filter-row">
          <span class="filter-label">Nation</span>
          ${nationPills}
        </div>
        <div class="filter-row">
          <span class="filter-label">Discipline</span>
          ${discPills}
        </div>
        <div class="filter-row" style="margin-top:4px">
          <span class="filter-label">Sort</span>
          <button class="fsort active" data-sort="name" onclick="rosterSortBy('name')">Name</button>
          <button class="fsort" data-sort="nation" onclick="rosterSortBy('nation')">Nation</button>
          <button class="fsort" data-sort="discipline" onclick="rosterSortBy('discipline')">Discipline</button>
          <button class="fsort" data-sort="debut" onclick="rosterSortBy('debut')">Debut Year</button>
        </div>
        <div class="filter-count" id="roster-count">Showing <b>${FIGHTERS.length}</b> of <b>${FIGHTERS.length}</b> fighters</div>
      </div>
      <div class="grid roster-grid">${sorted.map(ft =>
        `<div class="card" onclick="go('fighter/${ft.id}')" data-nation="${ft.nationality}" data-discipline="${ft.baseStyle}" data-name="${ft.name}" data-debut="${ft.stats.debut||''}" role="button" tabindex="0" aria-label="${ft.name}, ${ft.nationality} ${ft.baseStyle}" onkeydown="if(event.key==='Enter'||event.key===' ')go('fighter/${ft.id}')">
          <div class="stripe" style="background:${ft.color}"></div>
          <div class="imgwrap">${imgOrPlaceholder(ft)}</div>
          <div class="body">
            <div class="flag">${flagHTML(ft.nationality)} ${ft.nationality}</div>
            <div class="nm">${ft.name}</div>
            <div class="al">"${ft.alias}"</div>
            <div class="meta"><span>${ft.baseStyle}</span></div>
          </div></div>`
      ).join('')}</div>
    </div></section>`;
  }

  function fighter(id){
    const ft=f(id); if(!ft) return roster();
    const sorted=[...FIGHTERS].sort((a,b)=>a.name.localeCompare(b.name));
    const idx=sorted.findIndex(x=>x.id===id);
    const prev=sorted[idx-1]||null;
    const next=sorted[idx+1]||null;
    return `<section><div class="wrap">
      <div class="fp-back-bar"><span class="fp-back" onclick="go('roster')">← Back to roster</span></div>
      <div class="fp">
        <div class="fp-img">${imgOrPlaceholder(ft)}</div>
        <div>
          <div class="fp-flag">${flagHTML(ft.nationality)} ${ft.nationality} — ${ft.hometown}</div>
          <h1>${ft.name}</h1>
          <div class="alias">“${ft.alias}”</div>
          <div class="tags">
            <span class="tag">Age <b>${ft.stats.age}</b></span>
            <span class="tag">Discipline <b>${ft.baseStyle}</b></span>
            <span class="tag">Competes <b>${ft.ruleset}</b></span>
            <span class="tag">Stance <b>${ft.stats.stance}</b></span>
            <span class="tag">Debut <b>${ft.stats.debut}</b></span>
          </div>
          <div class="specs">
            <div class="sp"><div class="l">Height</div><div class="v">${ft.stats.height}</div></div>
            <div class="sp"><div class="l">Weight</div><div class="v">${ft.stats.weight}</div></div>
            <div class="sp"><div class="l">Reach</div><div class="v">${ft.stats.reach}</div></div>
          </div>
          <div class="bio">${bioHTML(ft.bio, ft.id)}</div>
          ${quotesHTML(ft)}
          <div class="watch">
            <button class="btn btn-gold" onclick="go('shop')">Watch her fights</button>
            <button class="btn btn-ghost" onclick="go('watch/${ft.id}')">Past fights</button>
          </div>
        </div>
      </div>
      ${galleryHTML(ft)}
      <div class="fp-bottom-nav">
        ${prev?`<span class="btn btn-ghost" onclick="go('fighter/${prev.id}')">← ${prev.name}</span>`:'<span></span>'}
        <span class="fp-nav-center"><span class="btn btn-ghost" onclick="go('roster')">Roster</span></span>
        ${next?`<span class="btn btn-ghost" onclick="go('fighter/${next.id}')">${next.name} →</span>`:'<span></span>'}
      </div>
    </div></section>`;
  }

  function quotesHTML(ft){
    if(!ft.quotes || !ft.quotes.length) return '';
    const items = ft.quotes.map(q=>{
      // split "native (English)" into quote + translation if bracketed translation present
      const m = q.match(/^(.*?)\s*\((.+)\)\s*$/);
      if(m){
        return `<blockquote class="fq"><span class="fq-native">“${m[1].replace(/^"|"$/g,'')}”</span><span class="fq-trans">${m[2]}</span></blockquote>`;
      }
      return `<blockquote class="fq"><span class="fq-native">“${q.replace(/^"|"$/g,'')}”</span></blockquote>`;
    }).join('');
    return `<div class="quotes-sec" style="max-width:660px;margin-left:0">
      <div class="gh">In Her Words</div>
      <div class="quotes-grid">${items}</div>
    </div>`;
  }

  // Wraps any other fighter's name found in text with a link to their profile.
  function linkNames(text, selfId){
    let out = text;
    const esc = s => s.replace(/[-/\\^$*+?.()|[\]{}]/g,'\\$&');
    // First names that are unique across the roster (safe to link on their own)
    const firstCounts = {};
    FIGHTERS.forEach(ft=>{ const fn=ft.name.split(' ')[0]; firstCounts[fn]=(firstCounts[fn]||0)+1; });
    // Build a match list: full names first (longer, more specific), then unique first names
    const targets = [];
    FIGHTERS.forEach(ft=>{
      if(ft.id===selfId) return;
      targets.push({re:ft.name, id:ft.id, len:ft.name.length});
      const fn = ft.name.split(' ')[0];
      if(firstCounts[fn]===1 && fn!==ft.name){
        targets.push({re:fn, id:ft.id, len:fn.length});
      }
    });
    // Apply longest matches first so "Cheryl Ong" wins over "Cheryl"
    targets.sort((a,b)=>b.len-a.len);
    targets.forEach(t=>{
      // (?![^<]*>) avoids matching inside an existing <a ...> tag we just inserted
      const re = new RegExp('\\b'+esc(t.re)+'\\b(?![^<]*>)(?![^<]*<\\/a>)','g');
      out = out.replace(re, m=>`<a class="fname" onclick="go('fighter/${t.id}')">${m}</a>`);
    });
    return out;
  }

  function bioHTML(b, selfId){
    if(typeof b === 'string') return `<p>${linkNames(b,selfId)}</p>`;
    const block = (label, text)=> text ? `<div class="bio-block"><span class="bio-label">${label}</span><p>${linkNames(text,selfId)}</p></div>` : '';
    return block('Origin', b.origin)
         + block('In the cage', b.style)
         + block('Off the clock', b.personal)
         + block('Bad blood', b.rival)
         + block('What drives her', b.goal);
  }

  function galleryHTML(ft){
    const shots = (ft.gallery && ft.gallery.length) ? ft.gallery : [];

        <p class="vault-lead">She is the first one through the gym door every morning, and she will be the last one to leave. That is not a boast — it is simply what Pei Yee Lim considers the minimum.</p>

        <p class="vault-lead">Hana Jung speaks in short sentences. She considers each one before it arrives. In a sport full of people who perform confidence, she is the rare kind who simply has it — quiet, settled, and faintly unsettling to be across from.</p>
        <p>We met in Seoul, at a café near her gym in Mapo-gu. She ordered barley tea. She sat with her back to the wall.</p>
        <p><strong>Your grandfather competed in ssireum. When did you first understand what that meant?</strong></p>

      content: `
        <p class="vault-lead">Before Ying Ying Li throws a single punch, she has already won an argument. The argument is about space — who controls the centreline, who owns the distance between two bodies in a cage. She has been making this argument since she was nine years old. She has not yet lost it.</p>

        <p>Wing Chun is a system built around a single idea: the shortest path between two points is a straight line, and that line belongs to whoever claims it first. Ying Ying did not choose Wing Chun because it was fashionable. She chose it because it was honest.</p>

        <p>"Most systems ask you to move around a problem," she says, sitting very still in the way that people with exceptional body awareness tend to do. "Wing Chun asks you to go through it. I find that more truthful."</p>

        <h3>The System</h3>

        <p>Wing Chun's reputation in combat sports is complicated. It is ancient — traced to southern China, refined over three centuries, carried to Hong Kong by Ip Man and from there to the world. It is also, in certain circles, dismissed. Too traditional. Too narrow. Designed for a world before MMA, before the cage, before fighters who cross-train six disciplines before breakfast.</p>

        <p>Ying Ying has heard the critique. She does not argue with it directly. She answers it the way she answers most things — with her hands.</p>

        <p>"People say Wing Chun doesn't work in a cage," she says. "What they mean is that Wing Chun doesn't work the way they expect it to work. They are looking for something that looks like Wing Chun in a movie. I do not fight like a movie."</p>

        <p>What she does instead: she closes distance immediately, hands forward on the centreline, elbows tracking inward to deflect rather than absorb. The chain punch sequence — chain because each hand cycles through as the other retracts, a mechanical rhythm that generates speed rather than power — arrives before the opponent has processed the first contact. By the time the third punch lands, the first has already done its work.</p>

        <p>"Speed is the argument," she says. "Not strength. I am not the strongest fighter in the circuit. I do not need to be."</p>

        <h3>Porcelain</h3>

        <p>The alias arrived from somewhere in the circuit's early commentary — precise, beautiful, possibly fragile. She accepted it without comment.</p>

        <p>"I know what people mean by it," she says. There is a pause that does not feel uncomfortable. "They are telling me something breaks if you hit it hard enough. That is true of everything. The question is how hard you have to hit."</p>

        <p>She picks up a cup from the table beside her. Sets it down. Looks at it for a moment.</p>

        <p>"Porcelain also conducts heat perfectly. It does not absorb — it transfers. Everything that comes in goes back out, directed. I think that is closer to what I do."</p>

        <p>There are fighters on the roster who would disagree with this characterisation. Some of them have said so, in various ways, in various rooms. Ying Ying does not appear to be tracking these conversations.</p>

        <p>"I have been asked about other fighters," she says. "I find the question uninteresting. They will be across from me or they will not. If they are, I will answer them the way I always answer. If they are not, I have nothing to say."</p>

        <h3>What Comes Next</h3>

        <p>She has not yet fought in the circuit. She is unbothered by this. The preparation, she says, is the same regardless of whether the bout has been announced. She trains as if the fight is next week. It has always been next week.</p>

        <p>"I do not need a date to prepare," she says. "I need an opponent. The circuit will provide one."</p>

        <p>She picks up her phone. Checks something. Sets it down. Whatever she saw, she does not share it.</p>

        <p>She is already thinking about the next one.</p>

        <div class="vault-quote">"체系造就了我，但没有定义我。" <span>(The system made me, but it didn't define me.)</span></div>
      `
    }
  ];

  function vaultThumb(item){
    // GIF animated thumbnail takes priority
    if(item.gifThumb) return `<img src="${item.gifThumb}" alt="${item.title}" style="width:100%;height:100%;object-fit:cover">`;
    if(item.thumb) return `<img src="${item.thumb}" alt="${item.title}" loading="lazy">`;
    // Video card with play button overlay
    if(item.videoUrl){
      const ft = item.fighter ? f(item.fighter) : null;
      const bg = ft ? `<img src="images/${ft.image}" alt="${ft.name}" loading="lazy" style="opacity:.5;filter:grayscale(40%);width:100%;height:100%;object-fit:cover;object-position:top">` : '';
      return `${bg}<div class="vault-play" style="position:absolute">▶</div>`;
    }
    const ft = item.fighter ? f(item.fighter) : null;
    if(ft && ft.image) return `<img src="images/${ft.image}" alt="${ft.name}" loading="lazy" style="width:100%;height:100%;object-fit:cover;object-position:top">`;
    return `<div class="vault-thumb-placeholder"><span style="font-size:48px;opacity:.15">龍</span></div>`;
  }

  function vaultCard(item){
    const ft = item.fighter ? f(item.fighter) : null;
    const fighterLabel = ft ? `${ft.name} "${ft.alias}"` : 'DRAGONS Circuit';
    const onclick = item.link
      ? `window.open('${item.link}','_blank')`
      : `go('vault/${item.id}')`;
    return `<div class="vault-card" onclick="${onclick}" role="button" tabindex="0" aria-label="${item.title.replace(/"/g,'&quot;').replace(/'/g,'&apos;')}">
      <div class="vault-thumb">
        ${vaultThumb(item)}
        <span class="vault-type ${item.type}">${item.type.toUpperCase()}</span>
      </div>
      <div class="vault-body">
        <div class="vault-fighter">${fighterLabel}</div>
        <div class="vault-title">${item.title}</div>
        <div class="vault-teaser">${item.teaser}</div>
        <div class="vault-meta">${item.date}</div>
      </div>
    </div>`;
  }

  function vaultArticle(id){
    const item = VAULT_ITEMS.find(x=>x.id===id);
    if(!item || !item.content) return vault();
    const ft = item.fighter ? f(item.fighter) : null;

    const fighterLine = ft ? `<div style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:8px">${ft.name} &ldquo;${ft.alias}&rdquo;</div>` : '';
    const headline = `<h1 class="vault-article-title">${item.title}</h1>`;
    const dateLine = `<div class="vault-article-date">${item.date}</div>`;
    const isTikTok = item.videoUrl && item.videoUrl.includes('tiktok.com');
    const videoBlock = item.videoUrl
      ? isTikTok
        ? `<div class="vault-video-wrap vault-video-tiktok">

          </div>`
        : `<div class="vault-video-wrap">

          </div>`

    const body = `<div class="vault-article-body">${item.content}${videoBlock}</div>

    if(item.layout === 'hero'){
      const hero = heroSrc ? `<div class="vault-hero-img"><img src="${heroSrc}" alt="${item.title}" style="width:100%;height:520px;object-fit:cover"></div>` : `<div class="vault-hero-img vault-hero-placeholder"><span class="glyph" style="font-size:80px;opacity:.15">龍</span></div>`;

      : `<div class="vault-split-img vault-split-placeholder"><span class="glyph" style="font-size:64px;opacity:.15">龍</span></div>`;
    const textSide = `<div class="vault-split-text">${typeBadge}${fighterLine}${headline}${dateLine}${body}</div>`;

    if(item.layout === 'photo-left'){
      return `<section><div class="wrap">${backBar}<div class="vault-split">${photoSide}${textSide}</div></div></section>`;
    }
    // photo-right default
    return `<section><div class="wrap">${backBar}<div class="vault-split">${textSide}${photoSide}</div></div></section>`;
  }

  // ===== FIGHT LOG =====
  // Add a bout here and records + Past Fights update automatically.
  // Format: { winner:'fighter-id', loser:'fighter-id', method:'KO'|'TKO'|'Decision'|'Submission',
  //           round: 2, date:'2026-07-12', event:'DRAGONS 1' }
  // Leave empty until real fights are produced.
  const FIGHTS = [
    { winner:"pei-yee", loser:"cheryl-ong", method:"KO", date:"2026-06-28", event:"DRAGONS 1", video:"peiyee-vs-cheryl", shopUrl: SHOP.fight1, released:true },
    { winner:"ying-ying", loser:"jia-park", method:"KO", date:"2026-06-29", event:"DRAGONS 2", video:"yingying-vs-jia", shopUrl: SHOP.fight2, released:false },
    { winner:"jhut-chirathivat", loser:"kanyarat-srisuk", method:"KO", date:"2026-07-03", event:"DRAGONS 3", video:"jhut-vs-kanyarat", shopUrl: null, released:false },
  ];
  // Only released fights count toward records and appear on the Spoilers page.
  // Flip released:true when a fight goes live.
  const RELEASED_FIGHTS = FIGHTS.filter(b => b.released);

  // Compute each fighter's W-L-KO from the fight log (overrides the 0-0 in data once fights exist)
  function computeRecords(){
    const rec = {};
    FIGHTERS.forEach(ft=>{ rec[ft.id] = {w:0,l:0,ko:0}; });
    RELEASED_FIGHTS.forEach(b=>{
      if(rec[b.winner]){ rec[b.winner].w++; if(b.method==='KO'||b.method==='TKO') rec[b.winner].ko++; }
      if(rec[b.loser]){ rec[b.loser].l++; }
    });
    return rec;
  }
  const LIVE_REC = computeRecords();
  function getRec(id){ return RELEASED_FIGHTS.length ? LIVE_REC[id] : f(id).record; }

  function fightFace(ft){

  }

  // ===== COMMISSION A MATCHUP =====
  let commPicks = [null, null];

  function commCard(ft){
    const sel = commPicks.includes(ft.id);
    const full = commPicks[0] && commPicks[1] && !sel;
    return `<div class="comm-card${sel?' selected':''}${full?' disabled':''}" onclick="commToggle('${ft.id}')">
      <div class="comm-img"><img src="images/${ft.image}" alt="${ft.name}" loading="lazy"
        onerror="this.style.display='none'"></div>
      <div class="comm-nm">${ft.name}</div>
      <div class="comm-al">"${ft.alias}"</div>
      <div class="comm-fl">${flagHTML(ft.nationality)} ${ft.baseStyle}</div>

    </div>`;
  }

  window.commToggle = function(id){
    if(commPicks.includes(id)){
      commPicks[commPicks.indexOf(id)] = null;
    } else if(!commPicks[0]){
      commPicks[0] = id;
    } else if(!commPicks[1]){
      commPicks[1] = id;
    }
    renderCommState();
  };

  function renderCommState(){
    const a = commPicks[0] ? f(commPicks[0]) : null;
    const b = commPicks[1] ? f(commPicks[1]) : null;

    document.querySelectorAll('.comm-card').forEach(el=>{
      const cid = el.getAttribute('onclick').match(/'([^']+)'/)[1];
      const sel = commPicks.includes(cid);
      const full = a && b && !sel;
      el.classList.toggle('selected', sel);
      el.classList.toggle('disabled', full);
    });

    const pickA = document.getElementById('comm-pick-a');
    const pickB = document.getElementById('comm-pick-b');
    const btn = document.getElementById('comm-btn');

    if(pickA){
      pickA.className = 'comm-pick'+(a?'':' empty');
      pickA.querySelector('.cp-name').textContent = a ? a.name : 'Select first fighter';
    }
    if(pickB){
      pickB.className = 'comm-pick'+(b?'':' empty');
      pickB.querySelector('.cp-name').textContent = b ? b.name : 'Select second fighter';
    }
    if(btn) btn.disabled = !(a && b);
  }

  window.commSubmit = function(){
    const a = f(commPicks[0]), b = f(commPicks[1]);
    if(!a || !b) return;
    const subj = encodeURIComponent('DRAGONS Matchup Commission: '+a.name+' vs '+b.name);
    const body = encodeURIComponent(
      'I\'d like to commission a matchup:\n\n'+
      'Fighter A: '+a.name+' "'+a.alias+'" ('+a.nationality+', '+a.baseStyle+')\n'+
      'Fighter B: '+b.name+' "'+b.alias+'" ('+b.nationality+', '+b.baseStyle+')\n\n'+
      'Why this fight:\n\n'
    );
    window.open('mailto:tf1573188@gmail.com?subject='+subj+'&body='+body, '_self');
    // Show confirmation state after a short delay
    setTimeout(function(){
      const note = document.getElementById('comm-confirm');
      if(note){ note.style.display='block'; }
      const btn = document.getElementById('comm-btn');
      if(btn){ btn.textContent='Request Sent ✓'; btn.disabled=true; btn.style.opacity='0.6'; }
    }, 600);
  };

  function commission(){
    commPicks = [null, null];
    const sorted = [...FIGHTERS].sort((a,b)=>a.name.localeCompare(b.name));
    return `<section><div class="wrap">
      <span class="eyebrow">Make the Card</span>
      <div class="sec-head"><h2>Commission a Matchup</h2><p>Pick any two fighters and email us for a quote. All commissions are paid — get in touch for a quote and we'll confirm availability and pricing.</p></div>

      <div class="comm-selected">
        <div class="comm-pick empty" id="comm-pick-a">
          <div class="cp-label">Fighter A</div>
          <div class="cp-name">Select first fighter</div>
        </div>
        <div class="comm-vs">対</div>
        <div class="comm-pick empty" id="comm-pick-b">
          <div class="cp-label">Fighter B</div>
          <div class="cp-name">Select second fighter</div>
        </div>
      </div>

      <div class="comm-submit">
        <button class="btn btn-gold" id="comm-btn" disabled onclick="commSubmit()">Commission This Fight</button>
      </div>
      <div class="comm-note">Email us to request a quote. All commissions are paid productions — we'll confirm availability and pricing.</div>
      <div id="comm-confirm" style="display:none;margin-top:16px;padding:14px 20px;background:rgba(31,158,107,.1);border:1px solid var(--emerald);border-radius:4px;text-align:center;max-width:500px;margin-left:auto;margin-right:auto">
        <span style="font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:.12em;text-transform:uppercase;font-size:13px;color:var(--emerald)">Request sent ✓</span>
        <p style="color:var(--muted);font-size:13px;margin-top:6px">If your email client didn't open, send your commission request directly to <a href="mailto:tf1573188@gmail.com" style="color:var(--gold)">tf1573188@gmail.com</a></p>
      </div>
      <div class="comm-note" style="margin-top:10px">Enter the Dragon — follow us for fight announcements and previews: <a href="https://www.instagram.com/dragonsfighting123/" target="_blank" rel="noopener" style="color:var(--gold)">Instagram</a> · <a href="https://www.tiktok.com/@dragonsfighting" target="_blank" rel="noopener" style="color:var(--gold)">TikTok</a></div>

      <div class="comm-grid">${sorted.map(commCard).join('')}</div>

    </div></section>`;
  }

  let savedScroll = 0;       // remembers roster scroll position
  let lastRoute = null;
  function render(){
    const hash=(location.hash||'#home').slice(1);
    const [route,arg]=hash.split('/');
    // Save scroll position when navigating FROM roster INTO a fighter profile
    if(lastRoute==='roster' && route==='fighter'){ savedScroll = window.scrollY; }
    let html;
    switch(route){
      case 'roster': html=roster(); break;
      case 'fighter': html=fighter(arg); break;
      case 'matchups': html=commission(); break;
      case 'vault': html=vault(arg); break;
      case 'venue': html=venueDetail(arg); break;
      case 'records': html=records(arg); break;
      case 'watch': html=watch(arg); break;
      case 'about': html=about(); break;
      case 'shop': html=shop(); break;
      case 'commission': html=commission(); break;
      default:
        if(route && route !== 'home'){
          html=`<section><div class="wrap" style="text-align:center;padding:80px 24px">
            <span class="eyebrow">404</span>
            <h2 style="font-size:clamp(34px,6vw,64px);margin:16px 0 20px">Page Not Found</h2>
            <p style="color:var(--muted);max-width:400px;margin:0 auto 32px">That route doesn't exist in the circuit. Head back and find your fighter.</p>
            <div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap">
              <button class="btn btn-gold" onclick="go('roster')">View the Roster</button>
              <button class="btn btn-ghost" onclick="go('home')">Back to Home</button>
            </div>
          </div></section>`;
        } else {
          html=home();
        }
    }
    app.innerHTML=html;
    // Update floating back bar
    if(window._updateFloatBar) window._updateFloatBar(route, arg);
    // Roster filter state management
    if(route==='roster'){
      if(lastRoute !== 'fighter'){
        // Coming from anywhere except a fighter profile — reset filters
        rosterFilter = { nation: [], discipline: null };
        rosterSort = 'name';
      }
      // Restore active pill visual states (works for both fresh load and back-from-profile)
      document.querySelectorAll('.fpill[data-type="nation"]').forEach(p=>{
        p.classList.toggle('active', rosterFilter.nation.includes(p.dataset.value));
      });
      document.querySelectorAll('.fpill[data-type="discipline"]').forEach(p=>{
        p.classList.toggle('active', p.dataset.value===rosterFilter.discipline);
      });
      document.querySelectorAll('.fsort').forEach(p=>{
        p.classList.toggle('active', p.dataset.sort===rosterSort);
      });
      // Re-apply filter + sort
      applyRosterFilter();
    }
    // Restore roster scroll when coming BACK from a profile; otherwise go to top
    if(lastRoute==='fighter' && route==='roster'){
      window.scrollTo(0, savedScroll);
    } else {
      window.scrollTo(0,0);
    }
    lastRoute = route;
    document.querySelectorAll('nav.links a').forEach(a=>a.classList.toggle('active',a.dataset.route===route));
    closeMenu();
  }
  function go(p){location.hash=p;} window.go=go;

  // ---- Lightbox (gallery zoom) ----
  let _prevFocus=null;
  window.openLightbox=function(src,cap){
    _prevFocus=document.activeElement;
    document.getElementById('lightbox-img').src=src;
    document.getElementById('lightbox-img').alt=cap||'';
    document.getElementById('lightbox-cap').textContent=cap||'';
    const lb=document.getElementById('lightbox');
    lb.classList.add('open');
    document.body.style.overflow='hidden';
    // Focus the close button
    const closeBtn=lb.querySelector('.lightbox-close');
    if(closeBtn) setTimeout(()=>closeBtn.focus(),50);
  };
  window.closeLightbox=function(e){
    if(e) e.stopPropagation();
    document.getElementById('lightbox').classList.remove('open');
    document.getElementById('lightbox-img').src='';
    document.body.style.overflow='';
    if(_prevFocus) _prevFocus.focus();
  };
  document.addEventListener('keydown',function(e){
    const lb=document.getElementById('lightbox');
    if(!lb.classList.contains('open')) return;
    if(e.key==='Escape'){ closeLightbox(); return; }
    // Focus trap — keep Tab inside lightbox
    if(e.key==='Tab'){
      const focusable=lb.querySelectorAll('button,[tabindex]:not([tabindex="-1"])');
      const first=focusable[0], last=focusable[focusable.length-1];
      if(e.shiftKey){ if(document.activeElement===first){e.preventDefault();last.focus();} }
      else { if(document.activeElement===last){e.preventDefault();first.focus();} }
    }
  });

  // Floating back-to-roster bar on fighter profiles
  (function(){
    const floatBar = document.getElementById('fp-float');
    const floatName = document.getElementById('fp-float-name');
    let currentRoute = '';
    let currentFighterName = '';

    window.addEventListener('scroll', function(){
      if(currentRoute !== 'fighter' && !(currentRoute === 'vault' && window.location.hash.includes('/'))){ floatBar.style.display='none'; return; }
      if(window.scrollY > 200){
        floatBar.style.display='block';
        requestAnimationFrame(()=>floatBar.classList.add('visible'));
      } else {
        floatBar.classList.remove('visible');
        setTimeout(()=>{ if(!floatBar.classList.contains('visible')) floatBar.style.display='none'; }, 250);
      }
    });

    // Hook into render to track current route and fighter name
    const origRender = render;
    window._updateFloatBar = function(route, arg){
      currentRoute = route;
      const floatBack = document.getElementById('fp-float-back');
      if(route==='fighter' && arg){
        const ft = FIGHTERS.find(x=>x.id===arg);
        if(ft){
          currentFighterName=ft.name;
          floatName.textContent=ft.name;
          if(floatBack){ floatBack.textContent='← Back to Roster'; floatBack.onclick=function(){go('roster');}; }
        }
      } else if(route==='venue' && arg){
        const venue = typeof VENUES !== 'undefined' ? VENUES.find(x=>x.id===arg) : null;
        floatName.textContent = venue ? venue.name : '';
        if(floatBack){ floatBack.textContent='← Vault'; floatBack.onclick=function(){go('vault');}; }
      } else if(route==='vault' && arg){
        const item = typeof VAULT_ITEMS !== 'undefined' ? VAULT_ITEMS.find(x=>x.id===arg) : null;
        floatName.textContent = item ? item.title : '';
        if(floatBack){ floatBack.textContent='← The Vault'; floatBack.onclick=function(){go('vault');}; }
      } else {
        floatBar.classList.remove('visible');
        floatBar.style.display='none';
      }
    };
  })();
  function toggleMenu(){document.getElementById('links').classList.toggle('open');document.getElementById('navshop').classList.toggle('open');}
  function closeMenu(){document.getElementById('links').classList.remove('open');document.getElementById('navshop').classList.remove('open');}
  window.toggleMenu=toggleMenu;
  /* SPOILER REVEAL — reveal a single fight result, or all at once */
  function revealResult(cardId){
    const card=document.getElementById(cardId);
    if(!card) return;
    card.classList.toggle('revealed');
    const btn=card.querySelector('.rc-reveal-btn');
    if(btn) btn.textContent = card.classList.contains('revealed') ? 'Hide result' : 'Reveal result';
  }
  window.revealResult=revealResult;
  function revealAll(){
    document.querySelectorAll('.rec-card').forEach(c=>{
      c.classList.add('revealed');
      const b=c.querySelector('.rc-reveal-btn');
      if(b) b.textContent='Hide result';
    });
    const btn=document.getElementById('reveal-all-btn');
    if(btn) btn.style.display='none';
  }
  window.revealAll=revealAll;
  /* FIGHT PREDICTION POLL */
  const POLL_CONFIG = {
    1: { left: 'Cheryl Ong', right: 'Pei Yee Lim', seedLeft: 43, seedRight: 57, closed: false, result: null }
  };

  function initPolls() {
    Object.keys(POLL_CONFIG).forEach(id => {
      const cfg = POLL_CONFIG[id];
      const el = document.getElementById('ff-poll-' + id);
      if (!el) return;
      const voted = localStorage.getItem('dragons-poll-' + id);
      const myVote = localStorage.getItem('dragons-poll-' + id + '-side');
      if (cfg.closed) {
        el.classList.add('closed', 'voted');
        const statusEl = document.getElementById('poll-status-' + id);
        if (statusEl) statusEl.textContent = cfg.result ? '· RESULT: ' + cfg.result : '· CLOSED';
      }
      if (voted) {
        showPollResults(id, myVote);
      }
    });
  }

  function castVote(id, side) {
    const cfg = POLL_CONFIG[id];
    if (!cfg || cfg.closed) return;
    if (localStorage.getItem('dragons-poll-' + id)) return;
    localStorage.setItem('dragons-poll-' + id, '1');
    localStorage.setItem('dragons-poll-' + id + '-side', side);
    if (side === 'left') cfg.seedLeft++;
    else cfg.seedRight++;
    showPollResults(id, side);
  }
  window.castVote = castVote;

  function showPollResults(id, selectedSide) {
    const cfg = POLL_CONFIG[id];
    const el = document.getElementById('ff-poll-' + id);
    if (!el) return;
    el.classList.add('voted');
    const total = cfg.seedLeft + cfg.seedRight;
    const leftPct = Math.round((cfg.seedLeft / total) * 100);
    const rightPct = 100 - leftPct;
    const pctLeft = document.getElementById('poll-pct-left-' + id);
    const pctRight = document.getElementById('poll-pct-right-' + id);
    if (pctLeft) pctLeft.textContent = leftPct + '%';
    if (pctRight) pctRight.textContent = rightPct + '%';
    const sideLeft = document.getElementById('poll-left-' + id);
    const sideRight = document.getElementById('poll-right-' + id);
    if (selectedSide === 'left' && sideLeft) sideLeft.classList.add('selected');
    if (selectedSide === 'right' && sideRight) sideRight.classList.add('selected');
    const fill = document.getElementById('poll-fill-' + id);
    if (fill) {
      fill.innerHTML = '<div class="ff-poll-fill-left" style="width:' + leftPct + '%"></div><div class="ff-poll-fill-right" style="width:' + rightPct + '%"></div>';
    }
  }

  setTimeout(initPolls, 100);

  function toggleMenu(){document.getElementById('links').classList.toggle('open');document.getElementById('navshop').classList.toggle('open');}
  function closeMenu(){document.getElementById('links').classList.remove('open');document.getElementById('navshop').classList.remove('open');}
  window.toggleMenu=toggleMenu;
  window.addEventListener('hashchange', function(){ render(); setTimeout(initPolls, 50); });
  render();
</script>
</body>
</html>
